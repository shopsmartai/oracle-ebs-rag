<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <!-- ─── Background ─── -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Reusable isometric box gradients (front / right / top) -->
    <linearGradient id="streamlitFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74c7ec"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ragFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="oracleFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="claudeFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ingestFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="notesFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ca3af"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="userFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Arrowhead -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 z" fill="#e2e8f0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="url(#bg)"/>

  <!-- ─── Title ─── -->
  <text x="40" y="50" font-size="26" font-weight="700" fill="#f1f5f9">Talk to EBS — Architecture</text>
  <text x="40" y="78" font-size="13" fill="#94a3b8">Oracle 23ai vector search · Claude with prompt caching · MIT, synthetic dataset</text>

  <!-- ═══════════════════════════════════════════════════════════
       BACK LAYER (data + LLM)
       ═══════════════════════════════════════════════════════════ -->

  <!-- Oracle 23ai (back-left) — represents the vector store -->
  <g id="oracle" transform="translate(180, 380)">
    <!-- Top face -->
    <polygon points="0,0 120,0 150,-30 30,-30" fill="#fca5a5" opacity="0.95"/>
    <!-- Right face -->
    <polygon points="120,0 150,-30 150,90 120,120" fill="#b91c1c" opacity="0.9"/>
    <!-- Front face -->
    <polygon points="0,0 120,0 120,120 0,120" fill="url(#oracleFront)"/>
    <text x="60" y="55" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Oracle 23ai</text>
    <text x="60" y="74" text-anchor="middle" fill="#fee2e2" font-size="11">VECTOR(1024,FLOAT32)</text>
    <text x="60" y="90" text-anchor="middle" fill="#fee2e2" font-size="11">VECTOR_DISTANCE</text>
    <text x="60" y="106" text-anchor="middle" fill="#fee2e2" font-size="11">rag_chunks · rag_documents</text>
  </g>

  <!-- Claude API (back-right) -->
  <g id="claude" transform="translate(680, 380)">
    <polygon points="0,0 120,0 150,-30 30,-30" fill="#fde68a" opacity="0.95"/>
    <polygon points="120,0 150,-30 150,90 120,120" fill="#b45309" opacity="0.9"/>
    <polygon points="0,0 120,0 120,120 0,120" fill="url(#claudeFront)"/>
    <text x="60" y="55" text-anchor="middle" fill="#1c1917" font-size="15" font-weight="700">Claude API</text>
    <text x="60" y="74" text-anchor="middle" fill="#451a03" font-size="11">Sonnet · streaming</text>
    <text x="60" y="90" text-anchor="middle" fill="#451a03" font-size="11">prompt caching</text>
    <text x="60" y="106" text-anchor="middle" fill="#451a03" font-size="11">ephemeral · 5-min TTL</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       MIDDLE LAYER (orchestrator)
       ═══════════════════════════════════════════════════════════ -->

  <g id="rag" transform="translate(420, 250)">
    <polygon points="0,0 180,0 215,-32 35,-32" fill="#6ee7b7" opacity="0.95"/>
    <polygon points="180,0 215,-32 215,100 180,132" fill="#047857" opacity="0.9"/>
    <polygon points="0,0 180,0 180,132 0,132" fill="url(#ragFront)"/>
    <text x="90" y="38" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">RAG Orchestrator</text>
    <text x="90" y="60" text-anchor="middle" fill="#d1fae5" font-size="11">src/oracle_ebs_rag/rag.py</text>
    <line x1="22" y1="74" x2="158" y2="74" stroke="#a7f3d0" stroke-opacity="0.5"/>
    <text x="90" y="92" text-anchor="middle" fill="#ecfdf5" font-size="11">1. retrieve top-k chunks</text>
    <text x="90" y="108" text-anchor="middle" fill="#ecfdf5" font-size="11">2. assemble cached prompt</text>
    <text x="90" y="124" text-anchor="middle" fill="#ecfdf5" font-size="11">3. stream grounded answer</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       FRONT LAYER (UI + user)
       ═══════════════════════════════════════════════════════════ -->

  <g id="streamlit" transform="translate(440, 120)">
    <polygon points="0,0 140,0 170,-30 30,-30" fill="#bae6fd" opacity="0.95"/>
    <polygon points="140,0 170,-30 170,80 140,110" fill="#1d4ed8" opacity="0.9"/>
    <polygon points="0,0 140,0 140,110 0,110" fill="url(#streamlitFront)"/>
    <text x="70" y="40" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Streamlit UI</text>
    <text x="70" y="60" text-anchor="middle" fill="#e0f2fe" font-size="11">streaming chat</text>
    <text x="70" y="76" text-anchor="middle" fill="#e0f2fe" font-size="11">live cost + cache HR</text>
    <text x="70" y="92" text-anchor="middle" fill="#e0f2fe" font-size="11">Sources panel</text>
  </g>

  <!-- User -->
  <g id="user" transform="translate(485, 40)">
    <circle cx="25" cy="14" r="10" fill="url(#userFront)" stroke="#f59e0b" stroke-width="1"/>
    <path d="M5,40 Q25,22 45,40 L45,52 L5,52 Z" fill="url(#userFront)" stroke="#f59e0b" stroke-width="1"/>
    <text x="60" y="35" fill="#fde68a" font-size="13" font-weight="600">DBA</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       INGESTION SIDE PATH
       ═══════════════════════════════════════════════════════════ -->

  <!-- Synthetic notes (far-left, deepest) -->
  <g id="notes" transform="translate(40, 580)">
    <polygon points="0,0 90,0 115,-25 25,-25" fill="#d1d5db" opacity="0.95"/>
    <polygon points="90,0 115,-25 115,65 90,90" fill="#374151" opacity="0.9"/>
    <polygon points="0,0 90,0 90,90 0,90" fill="url(#notesFront)"/>
    <text x="45" y="40" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Synthetic</text>
    <text x="45" y="55" text-anchor="middle" fill="#f3f4f6" font-size="11">notes/*.md</text>
    <text x="45" y="74" text-anchor="middle" fill="#e5e7eb" font-size="10">YAML frontmatter</text>
  </g>

  <!-- Ingestion pipeline -->
  <g id="ingest" transform="translate(220, 580)">
    <polygon points="0,0 130,0 155,-25 25,-25" fill="#ddd6fe" opacity="0.95"/>
    <polygon points="130,0 155,-25 155,65 130,90" fill="#5b21b6" opacity="0.9"/>
    <polygon points="0,0 130,0 130,90 0,90" fill="url(#ingestFront)"/>
    <text x="65" y="35" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Ingest</text>
    <text x="65" y="53" text-anchor="middle" fill="#ede9fe" font-size="10">chunk · embed · upsert</text>
    <text x="65" y="68" text-anchor="middle" fill="#ede9fe" font-size="10">Cohere embed-v3</text>
    <text x="65" y="82" text-anchor="middle" fill="#ede9fe" font-size="10">1024-dim float32</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       FLOW ARROWS (request path)
       ═══════════════════════════════════════════════════════════ -->

  <!-- User → Streamlit -->
  <path d="M510,95 L510,118" stroke="#e2e8f0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Streamlit → RAG orchestrator -->
  <path d="M510,232 L510,250" stroke="#e2e8f0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- RAG → Oracle (retrieve) -->
  <path d="M442,388 Q380,400 320,400" stroke="#e2e8f0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="345" y="394" text-anchor="middle" fill="#cbd5e1" font-size="10" font-style="italic">retrieve</text>

  <!-- Oracle → RAG (chunks) -->
  <path d="M320,420 Q380,430 442,415" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="345" y="445" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">top-k chunks</text>

  <!-- RAG → Claude (prompt + context) -->
  <path d="M600,388 Q650,400 700,400" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="650" y="394" text-anchor="middle" fill="#fde68a" font-size="10" font-style="italic">prompt + context</text>

  <!-- Claude → RAG (stream) -->
  <path d="M700,420 Q650,432 600,415" stroke="#fcd34d" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowOrange)"/>
  <text x="650" y="445" text-anchor="middle" fill="#fde68a" font-size="10" font-style="italic">stream answer</text>

  <!-- Notes → Ingest -->
  <path d="M155,615 L218,615" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Ingest → Oracle (one-time / batch) -->
  <path d="M315,580 Q280,520 240,500" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="540" text-anchor="middle" fill="#c4b5fd" font-size="10" font-style="italic">upsert vectors</text>

  <!-- ─── Legend bottom-right ─── -->
  <g transform="translate(800, 600)">
    <rect x="0" y="0" width="180" height="80" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="12" y="20" fill="#e2e8f0" font-size="11" font-weight="600">Flows</text>
    <line x1="12" y1="36" x2="40" y2="36" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="48" y="40" fill="#cbd5e1" font-size="10">request path</text>
    <line x1="12" y1="54" x2="40" y2="54" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text x="48" y="58" fill="#cbd5e1" font-size="10">response data</text>
    <line x1="12" y1="72" x2="40" y2="72" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <text x="48" y="76" fill="#cbd5e1" font-size="10">batch ingestion</text>
  </g>

  <!-- ─── Layer labels ─── -->
  <text x="40" y="180" fill="#475569" font-size="10" font-style="italic" transform="rotate(-90, 40, 180)">FRONT · presentation</text>
  <text x="40" y="320" fill="#475569" font-size="10" font-style="italic" transform="rotate(-90, 40, 320)">MIDDLE · orchestration</text>
  <text x="40" y="460" fill="#475569" font-size="10" font-style="italic" transform="rotate(-90, 40, 460)">BACK · data + LLM</text>
</svg>
